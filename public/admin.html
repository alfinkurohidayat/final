<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin | Website Pembelajaran</title>
    <link rel="stylesheet" href="css/login.css">

    <style>
        .question-box {
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        .question-item {
            margin-top: 10px;
        }

        .answer-table {
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header>
        <div class="logo">Panel Admin</div>
        <nav>
            <a href="index.html">Beranda</a>
            <a href="#" id="logoutBtn" style="display:none;">Logout</a>
        </nav>
    </header>

    <main class="admin-container">

        <!-- LOGIN -->
        <section id="login-section" class="login-container">
            <h2>Login Admin</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button id="loginBtn">Masuk</button>
            <p id="login-msg"></p>
        </section>

        <!-- ADMIN PANEL -->
        <section id="admin-section" style="display:none;">
            <h1>Kelola Media Pembelajaran</h1>

            <!-- FORM -->
            <form class="admin-form" enctype="multipart/form-data">

                <input type="hidden" id="editId">

                <input type="text" id="title" placeholder="Judul Materi" required>

                <select id="type" required>
                    <option value="">Pilih Jenis</option>
                    <option value="video">Video</option>
                    <option value="audio">Audio</option>
                    <option value="image">Image</option>
                </select>

                <select id="classLevel" required>
                    <option value="">Pilih Kelas</option>
                    <option value="Class 10">Class 10</option>
                    <option value="Class 11">Class 11</option>
                    <option value="Class 12">Class 12</option>
                </select>

                <select id="category" required>
                    <option value="">Pilih Kategori</option>
                    <option value="Material">Material</option>
                    <option value="Vocabulary">Vocabulary</option>
                    <option value="Tasks">Tasks</option>
                    <option value="Games">Games</option>
                </select>

                <!-- Overlay -->
                <select id="overlayType">
                    <option value="">Tanpa Media Tambahan</option>
                    <option value="audio">Sisip Audio</option>
                    <option value="video">Sisip Video</option>
                </select>

                <input type="file" id="overlayFile" style="display:none;">

                <input type="file" id="mediaFile" accept="video/*,audio/*,image/*">

                <!-- 🔥 FITUR SOAL -->
                <div class="question-box">
                    <label>
                        <input type="checkbox" id="isQuestion">
                        Jadikan sebagai soal
                    </label>

                    <select id="questionType">
                        <option value="truefalse">True / False</option>
                        <option value="essay">Essay</option>
                    </select>
                    <select id="questionCount">
                        <option value="">Jumlah Jawaban</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                    </select>
                    <div id="questionBuilder"></div>
                </div>

                <button type="button" id="addBtn">Tambah Media</button>

            </form>

            <!-- TABLE MEDIA -->
            <table class="admin-table" id="media-admin-list">
                <thead>
                    <tr>
                        <th>Judul</th>
                        <th>Tipe</th>
                        <th>Kelas</th>
                        <th>Kategori</th>
                        <th>URL</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <!-- 🔥 DATA JAWABAN SISWA -->
            <div class="answer-table">
                <h2>Data Jawaban Siswa</h2>
                <button onclick="loadAnswers()">Refresh</button>

                <table border="1" width="100%">
                    <thead>
                        <tr>
                            <th>Nama</th>
                            <th>Kelas</th>
                            <th>Jawaban</th>
                            <th>Waktu</th>
                        </tr>
                    </thead>
                    <tbody id="answerTable"></tbody>
                </table>
            </div>

        </section>

    </main>

    <script type="module" src="script.js"></script>

    <script>
        async function loadAnswers() {
            try {
                const res = await fetch("https://final-9pgj.onrender.com/api/answers", {
                    credentials: "include"
                });

                const data = await res.json();
                const tbody = document.getElementById("answerTable");

                tbody.innerHTML = "";

                data.forEach(item => {
                    const tr = document.createElement("tr");

                    tr.innerHTML = `
                        <td>${item.nama}</td>
                        <td>${item.kelas}</td>
                        <td>${item.answers.join(", ")}</td>
                        <td>${new Date(item.createdAt).toLocaleString()}</td>
                    `;

                    tbody.appendChild(tr);
                });

            } catch (err) {
                console.error("Gagal load jawaban:", err);
            }
        }
    </script>

</body>

</html>
